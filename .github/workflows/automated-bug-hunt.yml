name: Automated Bug Hunter

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 PM UTC (7 AM EST / 8 AM EDT)
    - cron: '0 0 * * *'   # 12:00 AM UTC (7 PM EST / 8 PM EDT previous day)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  hunt-and-fix-bugs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to compare changes

      - name: Setup GitHub CLI
        run: |
          # GitHub CLI is pre-installed on GitHub runners, but let's ensure it's updated
          gh --version || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y)

          # Verify installation
          gh --version

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate gh CLI with the workflow token
          echo "$GH_TOKEN" | gh auth login --with-token
          gh auth status

      - name: Install Copilot CLI extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install the Copilot extension for GitHub CLI
          gh extension install github/gh-copilot || gh extension upgrade gh-copilot

          # Verify installation
          gh copilot --version || echo "Copilot CLI installed"

      - name: Configure Git for Copilot authorship
        run: |
          git config --global user.name "GitHub Copilot"
          git config --global user.email "copilot@github.com"

      - name: Determine co-author
        id: coauthor
        uses: actions/github-script@v7
        with:
          script: |
            let coAuthorName, coAuthorEmail;

            if (context.eventName === 'schedule') {
              coAuthorName = 'William Patton';
              coAuthorEmail = 'pattonwebz@users.noreply.github.com';
            } else if (context.eventName === 'workflow_dispatch') {
              const { data: user } = await github.rest.users.getByUsername({
                username: context.actor
              });
              coAuthorName = user.name || context.actor;
              coAuthorEmail = `${context.actor}@users.noreply.github.com`;
            } else {
              coAuthorName = 'William Patton';
              coAuthorEmail = 'pattonwebz@users.noreply.github.com';
            }

            core.setOutput('name', coAuthorName);
            core.setOutput('email', coAuthorEmail);
            core.info(`Co-author will be: ${coAuthorName} <${coAuthorEmail}>`);

      - name: Check for existing bug-fix PRs
        id: check_prs
        uses: actions/github-script@v7
        with:
          script: |
            const searchQuery = `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open label:automated-bug-fix`;
            const { data: searchResults } = await github.rest.search.issuesAndPullRequests({
              q: searchQuery,
              per_page: 100
            });

            const openPrs = searchResults.items;

            // If 3 or more automated PRs exist, skip this run
            if (openPrs.length >= 3) {
              core.notice(`Skipping: ${openPrs.length} automated bug-fix PRs already open.`);
              core.setOutput('should_skip', 'true');
              core.setOutput('open_pr_count', openPrs.length);
              return;
            }

            const filesInOpenPrs = new Set();
            const prSummaries = [];

            for (const pr of openPrs) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              files.forEach(f => filesInOpenPrs.add(f.filename));
              prSummaries.push(`#${pr.number}: ${pr.title}`);
            }

            core.setOutput('should_skip', 'false');
            core.setOutput('open_pr_count', openPrs.length);
            core.setOutput('files_in_prs', Array.from(filesInOpenPrs).join(','));
            core.setOutput('pr_numbers', openPrs.map(pr => pr.number).join(','));
            core.setOutput('pr_summaries', prSummaries.join('\n'));

      - name: Get recently changed files
        id: changed_files
        if: steps.check_prs.outputs.should_skip != 'true'
        run: |
          # Get files changed in the last 7 days
          RECENT_FILES=$(git log --since="7 days ago" --name-only --pretty=format: | sort -u | grep -E '\.(php|js)$' || echo "")
          echo "recent_files<<EOF" >> $GITHUB_OUTPUT
          echo "$RECENT_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Filter candidate files
        id: candidates
        if: steps.check_prs.outputs.should_skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const recentFiles = `${{ steps.changed_files.outputs.recent_files }}`.split('\n').filter(Boolean);
            const filesInPrs = `${{ steps.check_prs.outputs.files_in_prs }}`.split(',').filter(Boolean);

            const candidateFiles = recentFiles.filter(f => !filesInPrs.includes(f));

            core.setOutput('candidate_files', candidateFiles.join('\n'));
            core.setOutput('candidate_count', candidateFiles.length);

            if (candidateFiles.length === 0) {
              core.notice('No new files to analyze - all recent changes are in open PRs');
              core.setOutput('should_run', 'false');
            } else {
              core.setOutput('should_run', 'true');
            }

      - name: Run Copilot bug analysis
        id: bug_hunt
        if: steps.candidates.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the analysis prompt
          cat > /tmp/bug_hunt_prompt.txt << 'EOF'
          You are analyzing a WordPress plugin for bugs.

          Context:
          - Repository: ${{ github.repository }}
          - Open automated PRs: ${{ steps.check_prs.outputs.open_pr_count }}
          - PRs: ${{ steps.check_prs.outputs.pr_summaries }}
          - Files already being fixed: ${{ steps.check_prs.outputs.files_in_prs }}

          Files to analyze (recently changed, NOT in open PRs):
          ${{ steps.candidates.outputs.candidate_files }}

          Task:
          1. Analyze these files for bugs (security issues, logic errors, undefined variables, etc.)
          2. Focus on WordPress-specific issues: missing nonces, unsanitized input, SQL injection risks
          3. Skip files that are already in the open PRs listed above
          4. If you find a NEW bug that isn't addressed in open PRs, describe it in detail
          5. Provide the file path, line numbers, bug description, and suggested fix
          6. Include test cases that would reproduce the bug

          Output format:
          BUG_FOUND: yes/no
          FILE: path/to/file.php
          LINES: 123-145
          SEVERITY: high/medium/low
          DESCRIPTION: [description]
          FIX: [suggested fix]
          TEST_CASES: [test cases]
          EOF

          echo "=== Analyzing code with Copilot CLI ==="
          cat /tmp/bug_hunt_prompt.txt
          echo ""

          # Use gh copilot to analyze
          # Note: The exact command may vary based on gh-copilot version
          gh copilot suggest "$(cat /tmp/bug_hunt_prompt.txt)" > /tmp/copilot_response.txt 2>&1 || {
            echo "Trying alternative copilot command..."
            # Try using gh copilot explain instead
            echo "${{ steps.candidates.outputs.candidate_files }}" | head -1 | xargs -I {} cat {} | gh copilot explain "Analyze this code for bugs: $(cat /tmp/bug_hunt_prompt.txt)" > /tmp/copilot_response.txt 2>&1 || true
          }

          echo "=== Copilot Response ==="
          cat /tmp/copilot_response.txt || echo "No response generated"

          # Check if a bug was found (this is a simple heuristic)
          if grep -qi "bug\|issue\|problem\|vulnerability" /tmp/copilot_response.txt; then
            echo "bug_found=true" >> $GITHUB_OUTPUT
            echo "response<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/copilot_response.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "bug_found=false" >> $GITHUB_OUTPUT
            echo "No bugs detected by Copilot"
          fi

      - name: Create issue with Copilot findings
        if: steps.bug_hunt.outputs.bug_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const time = new Date().toISOString().split('T')[1].substring(0, 5);

            const copilotResponse = `${{ steps.bug_hunt.outputs.response }}`;

            const body = `## 🤖 Automated Bug Hunt - ${date} ${time} UTC

            ### 🔍 Copilot Analysis Results

            ${copilotResponse}

            ---

            ### Next Steps

            @copilot Based on the analysis above, please:

            1. Confirm this is a legitimate bug that needs fixing
            2. Provide the exact code changes needed to fix it
            3. Write PHPUnit test cases that:
               - Reproduce the bug (should fail before fix)
               - Verify the fix works (should pass after fix)
            4. Ensure the fix follows WordPress Coding Standards

            Once confirmed, I'll ask you to create a PR with the fix.

            **Co-author for commits:** ${{ steps.coauthor.outputs.name }} <${{ steps.coauthor.outputs.email }}>

            ---
            _Automated analysis by [Bug Hunter workflow](.github/workflows/automated-bug-hunter.yml)_`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🐛 Potential Bug Detected - ${date}`,
              labels: ['automated-bug-hunt', 'needs-review', 'bug'],
              body: body
            });

            core.notice(`✅ Created issue #${issue.data.number} with Copilot findings`);

      - name: Summary
        if: always()
        run: |
          echo "=== Bug Hunter Summary ==="
          echo "Should skip: ${{ steps.check_prs.outputs.should_skip }}"
          echo "Open PRs: ${{ steps.check_prs.outputs.open_pr_count }}"
          echo "Candidate files: ${{ steps.candidates.outputs.candidate_count }}"
          echo "Bug found: ${{ steps.bug_hunt.outputs.bug_found }}"
