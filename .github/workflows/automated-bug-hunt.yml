name: Automated Bug Hunter

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 PM UTC (7 AM EST / 8 AM EDT)
    - cron: '0 0 * * *'   # 12:00 AM UTC (7 PM EST / 8 PM EDT previous day)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  hunt-and-fix-bugs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to compare changes

      - name: Configure Git for Copilot authorship
        run: |
          git config --global user.name "GitHub Copilot"
          git config --global user.email "copilot@github.com"

      - name: Determine co-author
        id: coauthor
        uses: actions/github-script@v7
        with:
          script: |
            let coAuthorName, coAuthorEmail;

            if (context.eventName === 'schedule') {
              // Scheduled run - use William Patton as co-author
              coAuthorName = 'William Patton';
              coAuthorEmail = 'pattonwebz@users.noreply.github.com';
            } else if (context.eventName === 'workflow_dispatch') {
              // Manual trigger - use the triggering user as co-author
              const { data: user } = await github.rest.users.getByUsername({
                username: context.actor
              });

              coAuthorName = user.name || context.actor;
              // Use GitHub's noreply email format for privacy
              coAuthorEmail = `${context.actor}@users.noreply.github.com`;
            } else {
              // Fallback to William Patton
              coAuthorName = 'William Patton';
              coAuthorEmail = 'pattonwebz@users.noreply.github.com';
            }

            core.setOutput('name', coAuthorName);
            core.setOutput('email', coAuthorEmail);
            core.info(`Co-author will be: ${coAuthorName} <${coAuthorEmail}>`);

      - name: Check for existing bug-fix PRs
        id: check_prs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:automated-bug-fix`,
              per_page: 100
            });

            // Also check for any PRs with the bot label
            const { data: labeledPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-bug-fix',
              per_page: 100
            });

            const allOpenPrs = [...prs, ...labeledPrs];
            const uniquePrs = [...new Map(allOpenPrs.map(pr => [pr.number, pr])).values()];

            // Extract files changed in open PRs
            const filesInOpenPrs = new Set();
            for (const pr of uniquePrs) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              files.forEach(f => filesInOpenPrs.add(f.filename));
            }

            core.setOutput('has_open_prs', uniquePrs.length > 0);
            core.setOutput('open_pr_count', uniquePrs.length);
            core.setOutput('files_in_prs', Array.from(filesInOpenPrs).join(','));
            core.setOutput('pr_numbers', uniquePrs.map(pr => pr.number).join(','));

            return {
              hasOpenPrs: uniquePrs.length > 0,
              count: uniquePrs.length,
              files: Array.from(filesInOpenPrs)
            };

      - name: Get recently changed files
        id: changed_files
        run: |
          # Get files changed in the last 7 days
          RECENT_FILES=$(git log --since="7 days ago" --name-only --pretty=format: | sort -u | grep -E '\.(php|js)$' || echo "")
          echo "recent_files<<EOF" >> $GITHUB_OUTPUT
          echo "$RECENT_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Find and fix bugs
        uses: github/ai-agent@v1
        with:
          agent: bug-hunter
          task: |
            ## Context
            - **Open bug-fix PRs**: ${{ steps.check_prs.outputs.open_pr_count }}
            - **PR numbers**: ${{ steps.check_prs.outputs.pr_numbers }}
            - **Files already in open PRs**: ${{ steps.check_prs.outputs.files_in_prs }}
            - **Recently changed files**: ${{ steps.changed_files.outputs.recent_files }}

            ## Critical Rules - Avoiding Duplicates

            1. **SKIP files already in open PRs**: Do NOT analyze or create PRs for any files listed in "Files already in open PRs" above

            2. **Check existing PR descriptions**: Review the open PR numbers listed above to see what bugs have already been identified

            3. **Prioritize recently changed files**: Focus analysis on files in "Recently changed files" that are NOT in open PRs

            4. **One bug per PR**: Only fix ONE distinct bug per run, even if multiple are found

            5. **Use consistent branch naming**: Create branch named `automated-bug-fix/YYYY-MM-DD-HH-MM` with current timestamp

            6. **Exit if no new bugs**: If all found bugs are already in open PRs, exit without creating a PR

            ## Analysis Process

            1. **Review Open PRs First**:
               - Read descriptions of PRs #${{ steps.check_prs.outputs.pr_numbers }}
               - Note which bugs/files are already being addressed

            2. **Scan for New Bugs**:
               - Focus on recently changed files NOT in open PRs
               - Look for security issues, logic errors, PHP warnings
               - Check for missing nonce verification, SQL injection risks
               - Verify proper sanitization/escaping

            3. **If New Bug Found**:
               - Verify it's NOT already addressed in an open PR
               - Create minimal fix for ONE bug only
               - Add PHPUnit tests reproducing bug and verifying fix
               - **Commit message format**:
                 ```
                 fix: [bug description]

                 [Detailed explanation of the bug and fix]

                 Co-authored-by: ${{ steps.coauthor.outputs.name }} <${{ steps.coauthor.outputs.email }}>
                 ```
               - **Create DRAFT PR** with label `automated-bug-fix`
               - Title format: `fix: [descriptive bug summary]`
               - Include clear description of the bug and how it was fixed

            4. **If No New Bugs**:
               - Log: "No new bugs found. X bugs already in open PRs."
               - Exit gracefully without creating PR

            ## Priority Areas (that aren't in open PRs)
            - Security vulnerabilities (XSS, SQLi, CSRF)
            - Fatal errors or warnings
            - Logic errors in recently changed code
            - Missing input validation/sanitization

          base-branch: develop

      - name: Label the created PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            // Find the PR just created by looking for very recent PRs
            const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000);

            const { data: recentPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 10
            });

            // Find PR created recently with our branch pattern and by github-actions
            const newPr = recentPrs.find(pr =>
              new Date(pr.created_at) > fiveMinutesAgo &&
              pr.head.ref.startsWith('automated-bug-fix/') &&
              (pr.user.login === 'github-actions[bot]' || pr.user.type === 'Bot')
            );

            if (newPr) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: newPr.number,
                labels: ['automated-bug-fix', 'needs-review']
              });

              core.info(`Successfully labeled PR #${newPr.number}`);
            } else {
              core.warning('No recent PR found to label. This might be expected if no bugs were found.');
            }

      - name: Add timestamp to PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            // Find the same PR we just labeled
            const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000);

            const { data: recentPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 10
            });

            const newPr = recentPrs.find(pr =>
              new Date(pr.created_at) > fiveMinutesAgo &&
              pr.head.ref.startsWith('automated-bug-fix/') &&
              (pr.user.login === 'github-actions[bot]' || pr.user.type === 'Bot')
            );

            if (newPr) {
              // Get current date in YYYY-MM-DD format
              const date = new Date();
              const dateStr = date.toISOString().split('T')[0];

              // Count existing automated PRs to get sequence number
              const { data: allAutomatedPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                labels: 'automated-bug-fix',
                per_page: 100
              });
              const sequenceNum = allAutomatedPrs.length;

              // Update title with timestamp
              const newTitle = `${newPr.title} - Auto-detected ${dateStr}`;

              // Prepend metadata to description
              const metadata = `**Automated bug fix #${sequenceNum}** detected on ${dateStr}\n\n---\n\n`;
              const newBody = metadata + (newPr.body || '');

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: newPr.number,
                title: newTitle,
                body: newBody
              });

              core.info(`Added timestamp to PR #${newPr.number}: ${dateStr}`);
            } else {
              core.warning('No recent PR found to update with timestamp.');
            }

